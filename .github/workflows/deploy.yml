name: Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest Revela release
        uses: robinraju/release-downloader@v1
        with:
          repository: Spectara/Revela
          latest: true
          preRelease: true
          fileName: "revela-linux-x64-full.tar.gz"
          out-file-path: ./revela-download

      - name: Extract Revela
        run: |
          tar -xzf ./revela-download/revela-linux-x64-full.tar.gz
          chmod +x ./revela

      - name: Install plugins from bundled packages
        run: |
          ./revela packages refresh
          ./revela plugin install Spectara.Revela.Plugins.Calendar --source ./packages
          ./revela plugin install Spectara.Revela.Plugins.Source.Calendar --source ./packages

      - name: Fetch calendar data
        run: ./revela source calendar fetch

      - name: Generate site
        run: ./revela generate all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
